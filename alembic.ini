# Alembic configuration (DR-008). ASCII ONLY in this file: alembic parses it
# with the system locale encoding (cp950 on zh-TW Windows), not UTF-8.
# The database URL is NOT set here - it comes from core.config
# (GRAPHRAG_POSTGRES_DSN) inside migrations/env.py, per the "never read
# os.environ directly / secrets in .env" guardrails.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
