name: CI
on:
  push:
    # docs/** = doc-only fast lane: per-SHA statuses let the branch fast-forward into main without a PR
    branches: [main, "docs/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync
      - run: uv run poe fmt-check
      - run: uv run poe lint
      - run: uv run poe typecheck
      - run: uv run poe test-cov # fast tests (unit + contract) under the coverage gate (fail-under 85)

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync
      - run: docker compose up -d --wait
      - run: uv run poe test-int
      - if: always()
        run: docker compose down -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Loop-protocol invariants (deterministic; PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.base_ref }}
          BRANCH: ${{ github.head_ref }}
        run: bash scripts/governance-check.sh
      - name: No-op on branch pushes
        if: github.event_name != 'pull_request'
        run: echo "push event — governance checks apply to PRs only (keeps this required context green for the doc lane)"
