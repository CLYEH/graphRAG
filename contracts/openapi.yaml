    get:
      operationId: getMcpInfo
      tags: [health]
      summary: The project's MCP connection info (v1.3, DR-012 rider)
      description: |
        What an external agent platform needs to connect to this project's MCP
        server through the DR-012 gateway (`graphrag serve-mcp`): the
        streamable-HTTP URL (`http://<host>:<port>/mcp/<project>`), derived
        from the server's GRAPHRAG_MCP_HTTP_HOST/PORT settings. Reachable only
        for path-addressable projects (this route is path-keyed on `{project}`
        exactly like the gateway), so a returned `url` is always non-null; a
        non-path-addressable name is Console-only and the Console derives that
        client-side from the name. Auth is `none` until §23 lands (additive
        enum evolution).
      responses:
        "200":
          description: MCP connection info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpInfoResponse"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Auth placeholder (DESIGN §23) — swap the implementation, keep the scheme.

  parameters:
    ProjectPath:
      name: project
      in: path
      required: true
      schema:
        type: string
    BuildIdPath:
      name: build_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobIdPath:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentIdPath:
      name: document_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChunkIdPath:
      name: chunk_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntityIdPath:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RelationIdPath:
      name: relation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CandidateIdPath:
      name: candidate_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SourceIdPath:
      name: source_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalIdPath:
      name: proposal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StepIdPath:
      name: step_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (default 50 🔧).
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor from `meta.next_cursor`; omit for the first page.
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      description: "`field:asc` or `field:desc`."
      schema:
        type: string
        pattern: "^[A-Za-z0-9_]+:(asc|desc)$"
    Filter:
      name: filter
      in: query
      required: false
      description: "Field filters as `filter[field]=value` (deepObject style)."
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
    Q:
      name: q
      in: query
      required: false
      description: |
        Server-side search (v1.3, SS1b). Matches over the endpoint's documented
        searchable fields; combines AND-wise with `filter[...]`. Declared only
        on endpoints that support it — like unsupported filters, a `q` an
        endpoint cannot honor is rejected loud (400 VALIDATION_ERROR), never
        silently ignored.
      schema:
        type: string
        minLength: 1
        maxLength: 256
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-generated key (≤255 chars). Same key + same request hash replays the
        stored original response; same key + different request hash → `409
        IDEMPOTENCY_CONFLICT`. Keys expire after the configured TTL (default 24h 🔧).
      schema:
        type: string
        maxLength: 255

  responses:
    Error:
      description: |
        Error envelope. Status → code mapping: 400 `VALIDATION_ERROR`/`QUERY_UNSAFE` ·
        404 `PROJECT_NOT_FOUND`/`BUILD_NOT_FOUND`/`JOB_NOT_FOUND`/`SOURCE_NOT_FOUND`/`PROPOSAL_NOT_FOUND` · 409
        `IDEMPOTENCY_CONFLICT`/`JOB_CONFLICT`/`BUILD_NOT_READY`/`NO_ACTIVE_BUILD`/`BUILD_NOT_RETRYABLE` ·
        429 `RATE_LIMITED` · 503 `STORE_UNAVAILABLE` · 504 `QUERY_TIMEOUT` · 500 `INTERNAL`.
        The upload endpoint also returns 413 (total size over the limit) and 415
        (body not multipart/form-data); like a 405, these carry no dedicated code and
        surface as VALIDATION_ERROR through the coarse 4xx fallback.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: PROJECT_NOT_FOUND
              message: project 'acme' does not exist
              details: null
              request_id: 6f1c2a4e-9b0d-4c39-9a55-1f2f3a4b5c6d
    Conflict:
      description: |
        Conflict — `IDEMPOTENCY_CONFLICT` (same Idempotency-Key, different request),
        `JOB_CONFLICT` (overlapping job), `BUILD_NOT_READY` (activation preflight
        failed) or `NO_ACTIVE_BUILD`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ---- envelope --------------------------------------------------------
    Meta:
      type: object
      description: Success-envelope metadata (DESIGN §15).
      required: [request_id, build_id, elapsed_ms]
      properties:
        request_id:
          type: string
          format: uuid
        build_id:
          description: Build that served the request; null when no build was involved.
          type: ["string", "null"]
          format: uuid
        elapsed_ms:
          type: integer
          minimum: 0

    PageMeta:
      type: object
      description: |
        Envelope metadata for paginated lists — next_cursor is required so clients can
        always distinguish the last page (null) from a non-conforming response.
      required: [request_id, build_id, elapsed_ms, next_cursor]
      properties:
        request_id:
          type: string
          format: uuid
        build_id:
          description: Build that served the request; null when no build was involved.
          type: ["string", "null"]
          format: uuid
        elapsed_ms:
          type: integer
          minimum: 0
        next_cursor:
          description: Opaque cursor for the next page; null on the last page.
          type: ["string", "null"]
        total:
          description: |
            Total matching rows (v1.3, SS1b). Null when the endpoint did not
            compute one (the pre-v1.3 behavior, still valid) — clients must
            treat null as "unknown", never as zero.
          type: ["integer", "null"]
          minimum: 0
        total_estimated:
          description: |
            True when `total` is a planner estimate rather than an exact count
            (large tables answer from statistics to keep lists fast). Absent or
            false ⇒ `total`, when non-null, is exact.
          type: boolean

    ErrorCode:
      type: string
      description: Frozen error-code enum (DESIGN §27.2; additive-only).
      enum:
        - PROJECT_NOT_FOUND
        - BUILD_NOT_FOUND
        - BUILD_NOT_READY
        - NO_ACTIVE_BUILD
        - VALIDATION_ERROR
        - JOB_NOT_FOUND
        - JOB_CONFLICT
        - IDEMPOTENCY_CONFLICT
        - QUERY_UNSAFE
        - QUERY_TIMEOUT
        - STORE_UNAVAILABLE
        - RATE_LIMITED
        - INTERNAL
        # v1.3 (DR-013, additive): the new source/proposal surfaces get precise
        # not-found codes (PROJECT/BUILD/JOB symmetry); retrying a non-failed
        # build is a typed state refusal, mirroring BUILD_NOT_READY.
        - SOURCE_NOT_FOUND
        - PROPOSAL_NOT_FOUND
        - BUILD_NOT_RETRYABLE

    Error:
      type: object
      description: |
        The full frozen shape is always present — details is null rather than absent,
        so error consumers never branch on missing fields.
      required: [code, message, details, request_id]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        details:
          description: Machine-readable context (field errors, guardrail verdicts, …).
          type: ["object", "null"]
          additionalProperties: true
        request_id:
          type: string
          format: uuid

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"

    WarningCode:
      type: string
      description: Frozen warning-code enum (DESIGN §27.2; additive-only).
      enum:
        - STORE_UNAVAILABLE
        - MODE_SKIPPED
        - PARTIAL_RESULTS
        - LOW_CONFIDENCE
        - GUARDRAIL_BLOCKED
        - TRUNCATED

    Warning:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/WarningCode"
        message:
          type: string

    # ---- projects / sources ----------------------------------------------
    Project:
      type: object
      required: [name, created_at]
      properties:
        name:
          type: string
          description: Stable project key (used in paths and store scoping).
        display_name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        display_name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        config:
          type: object
          additionalProperties: true

    ProjectUpdate:
      type: object
      properties:
        display_name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        config:
          type: object
          additionalProperties: true

    Source:
      type: object
      required: [id, uri]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: Connector kind (e.g. file, directory, url, database).
        uri:
          type: string
        enabled:
          description: |
            v1.3 (SRC2): false = soft-disabled — excluded from future
            ingests/builds; provenance of existing artifacts untouched. Absent
            means enabled (pre-SRC2 responses); servers always emit it once the
            SRC2 runtime lands.
          type: boolean
        metadata:
          type: object
          additionalProperties: true
        added_at:
          type: string
          format: date-time

    SourceCreate:
      type: object
      required: [uri]
      properties:
        kind:
          type: string
        uri:
          type: string
          minLength: 1
        metadata:
          type: object
          additionalProperties: true

    SourceUpdate:
      description: |
        v1.3 (SRC2, GAPS G2 option 2): lifecycle only. `uri` and `kind` are
        deliberately NOT properties here — they are immutable (corpus swap =
        disable old + register new; historical provenance is never rewritten).
        additionalProperties:false makes that structural at the raw-HTTP
        boundary too: a smuggled `uri` is a validation error, not a no-op.
      type: object
      required: [enabled]
      additionalProperties: false
      properties:
        enabled:
          type: boolean

    IngestRequest:
      type: object
      properties:
        source_ids:
          description: Restrict ingestion to these sources; omit for all.
          type: array
          items:
            type: string
            format: uuid

    BuildRequest:
      type: object
      properties:
        reason:
          type: ["string", "null"]
          description: Free-form operator note recorded on the build.

    RetryRequest:
      description: |
        v1.3 (RB1). Retry semantics are fixed (failed items only — a full
        re-run is `POST /projects/{project}/build`); the body carries only the
        operator note. Closed (additionalProperties:false): a control the fixed
        semantics do not honor (e.g. `{"mode":"all"}`) is a validation error at
        the contract boundary, never a silently-ignored request — the runtime
        never has to choose between accepting-and-ignoring or rejecting a
        contract-valid body.
      type: object
      additionalProperties: false
      properties:
        reason:
          type: ["string", "null"]
          description: Free-form operator note recorded on the retry build.

    # ---- uploads & document metadata (v1.2, DR-010) ------------------------
    DocumentMetadataSystem:
      type: object
      description: |
        System/connector-generated document context — stamped server-side and
        immutable to clients (DR-010 rule 1). Never accepted on upload.
      additionalProperties: true
      properties:
        connector:
          type: string
          description: The connector that produced the document (e.g. upload, url, database).
        original_filename:
          type: ["string", "null"]

    DocumentMetadataContext:
      type: object
      description: |
        General document context supplied by the user or source system. `title`
        and `document_type` are the stable core; every PROJECT-DEFINED field lives
        under `attributes` (a per-project bag whose keys' type/required/display/
        filterable are defined by projects.config.metadata_schema — DR-010 rule 2).
        The core stays closed (additionalProperties:false) so the envelope is a
        fixed shape, not a global field enum, while `attributes` keeps it
        domain-agnostic — a project adds `case_number` as `attributes.case_number`,
        never as a new top-level key.
      additionalProperties: false
      properties:
        title:
          type: ["string", "null"]
          description: Human display name for the document.
        document_type:
          type: ["string", "null"]
          description: Project-defined document type.
        attributes:
          type: object
          description: Project-defined key/values, typed by the project metadata schema.
          additionalProperties: true

    DocumentMetadataGovernance:
      type: object
      description: |
        Visibility / sensitivity / retention. MUST NOT be mixed into embedding
        text (DR-010 rule 3); exposure to agents is gated by the project-level
        exposure allowlist (projects.config, DR-010 rule 7), never by mere
        presence in this object.
      additionalProperties: true
      properties:
        visibility:
          type: ["string", "null"]
          description: e.g. internal / public / restricted (project-defined vocabulary).
        classification:
          type: ["string", "null"]

    DocumentMetadataEnvelope:
      type: object
      description: |
        Stable-core document metadata envelope (DR-010). `system` is server-owned,
        `context` is project-defined document context, `governance` controls
        exposure/retention. Document-level metadata is stored once (DR-010 rule 5);
        chunk-local context (page/section/speaker/time) is separate and not a copy
        of this envelope.
      required: [schema_version, system, context, governance]
      properties:
        schema_version:
          type: string
          description: Envelope version; server-stamped, not client-writable.
        system:
          $ref: "#/components/schemas/DocumentMetadataSystem"
        context:
          $ref: "#/components/schemas/DocumentMetadataContext"
        governance:
          $ref: "#/components/schemas/DocumentMetadataGovernance"

    DocumentMetadataInput:
      type: object
      description: |
        Client-supplied document metadata on upload: `context` and `governance`
        ONLY. `system` and `schema_version` are stamped server-side and rejected
        here (additionalProperties:false — the system namespace is structurally
        not client-writable, DR-010 rule 1), so human input can never silently
        overwrite connector/system metadata (DR-010 rule 4).
      additionalProperties: false
      properties:
        context:
          $ref: "#/components/schemas/DocumentMetadataContext"
        governance:
          $ref: "#/components/schemas/DocumentMetadataGovernance"

    UploadedFileAccepted:
      type: object
      description: |
        An accepted file — registered into the managed source with a canonical uri
        and its STORED metadata envelope. `metadata` is the full
        DocumentMetadataEnvelope: the server-stamped `system`/`schema_version` plus
        the client's `context`/`governance`, so the response freezes that the
        server cannot drop the server-owned namespace (DR-010 rule 1). Wiring the
        envelope here makes it load-bearing rather than a dangling type.
      additionalProperties: false
      required: [filename, original_filename, status, document_uri, metadata]
      properties:
        filename:
          type: string
          description: Server-sanitized stored name (client filenames are never used as paths).
        original_filename:
          type: string
          description: |
            The filename as submitted — the client's matching key back to its
            selection and to the filename-keyed upload metadata. Required (non-null)
            so every success row is correlatable.
        status:
          type: string
          enum: [accepted]
        document_uri:
          type: string
          description: Canonical file:// uri the managed source points at (BA9 rules).
        metadata:
          $ref: "#/components/schemas/DocumentMetadataEnvelope"
        reason: false

    UploadedFileRejected:
      type: object
      description: |
        A rejected file — a STATED refusal (never a silent drop, DR-010): `reason`
        is required and non-empty, so a client can always explain why a file was
        not stored.
      additionalProperties: false
      required: [original_filename, status, reason]
      properties:
        original_filename:
          type: string
          description: |
            The filename as submitted — the reject row's identity and the client's
            matching key (a rejected file has no stored name).
        status:
          type: string
          enum: [rejected]
        reason:
          type: string
          minLength: 1
          description: Why the file was rejected (e.g. extension not allowlisted, single-file size limit).
        filename: false
        document_uri: false

    UploadedFile:
      description: |
        Per-file outcome — exactly one of accepted (carries the canonical uri, no
        reason) or rejected (carries a non-empty reason, no uri). Each concrete
        variant forbids the other's discriminating field (`reason: false` /
        `document_uri: false`), so a rejected file WITHOUT a reason — a silent drop
        — is structurally unrepresentable (DR-010; the CleanPreviewRequest oneOf
        pattern makes codegen exact).
      oneOf:
        - $ref: "#/components/schemas/UploadedFileAccepted"
        - $ref: "#/components/schemas/UploadedFileRejected"

    UploadResult:
      type: object
      required: [source_id, files]
      properties:
        source_id:
          description: The canonical managed source registered/updated; null when nothing was accepted.
          type: ["string", "null"]
          format: uuid
        files:
          description: |
            One entry per submitted file (accepted or rejected). Non-empty: the
            request carries ≥1 file, so an empty manifest would be a silent all-drop,
            which the no-silent-drop guarantee forbids.
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/UploadedFile"

    # ---- builds ------------------------------------------------------------
    BuildStatus:
      type: string
      description: Build lifecycle (DESIGN §4/§14).
      enum: [building, ready, active, failed, archived]

    Build:
      type: object
      required: [id, project, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        parent_build_id:
          description: |
            v1.3 (RB1): set on a retry build — the terminal `failed` build this
            one re-runs failed items of. Null for ordinary builds. Lineage is
            this pointer on the CHILD; the parent's terminal record is never
            mutated.
          type: ["string", "null"]
          format: uuid
        status:
          $ref: "#/components/schemas/BuildStatus"
        config_hash:
          type: ["string", "null"]
        source_hash:
          type: ["string", "null"]
        started_at:
          type: ["string", "null"]
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time
        activated_at:
          type: ["string", "null"]
          format: date-time
        metrics:
          type: ["object", "null"]
          additionalProperties: true
        eval:
          type: ["object", "null"]
          additionalProperties: true

    # ---- jobs ---------------------------------------------------------------
    JobStatus:
      type: string
      enum: [queued, running, done, failed, cancelled]

    JobAccepted:
      type: object
      description: 202 payload for long operations (DESIGN §15).
      required: [job_id, status]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"

    Job:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"
        kind:
          type: string
          description: e.g. ingest, build, reproject.
        project:
          type: ["string", "null"]
        build_id:
          description: Building build this job writes to; null for jobs not bound to a build (DESIGN §27.7).
          type: ["string", "null"]
          format: uuid
        step:
          type: ["string", "null"]
        progress:
          type: number
          minimum: 0
          maximum: 1
        message:
          type: ["string", "null"]
        error:
          anyOf:
            - $ref: "#/components/schemas/Error"
            - type: "null"
        created_at:
          type: ["string", "null"]
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time

    JobEvent:
      type: object
      description: |
        SSE `data:` payload; event names are job.update|job.done|job.failed (DESIGN
        §27.2). The full frozen shape is always present — step/message are null rather
        than absent, so SSE consumers never branch on missing fields.
      required: [job_id, status, step, progress, message, ts]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"
        step:
          type: ["string", "null"]
        progress:
          type: number
          minimum: 0
          maximum: 1
        message:
          type: ["string", "null"]
        ts:
          type: string
          format: date-time

    # ---- inspection ---------------------------------------------------------
    Document:
      type: object
      required: [id, build_id, source_uri]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        build_id:
          type: string
          format: uuid
        source_uri:
          type: string
        content_hash:
          type: string
        mime:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string
        ingested_at:
          type: ["string", "null"]
          format: date-time
        raw:
          type: ["string", "null"]
          description: Raw text; returned on detail GET only.

    Chunk:
      type: object
      required: [id, document_id, build_id, ordinal, text]
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        build_id:
          type: string
          format: uuid
        ordinal:
          type: integer
        text:
          type: string
        token_count:
          type: ["integer", "null"]
        start_offset:
          type: ["integer", "null"]
        end_offset:
          type: ["integer", "null"]
        vector_point_id:
          type: ["string", "null"]
          format: uuid
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string

    CleanPreviewByDocument:
      type: object
      description: Chunk a document's raw text, read from the ACTIVE build.
      additionalProperties: false
      required: [document_id]
      properties:
        max_chars:
          description: Window size; omitted → project config, then engine default.
          type: integer
          minimum: 1
        overlap:
          description: Window overlap; omitted → project config, then engine default.
          type: integer
          minimum: 0
        document_id:
          type: string
          format: uuid
        text: false

    CleanPreviewByText:
      type: object
      description: Chunk the given text directly — works before any build exists.
      additionalProperties: false
      required: [text]
      properties:
        max_chars:
          description: Window size; omitted → project config, then engine default.
          type: integer
          minimum: 1
        overlap:
          description: Window overlap; omitted → project config, then engine default.
          type: integer
          minimum: 0
        text:
          type: string
          minLength: 1
        document_id: false

    CleanPreviewRequest:
      description: |
        Exactly ONE source: document_id or text. The two variants are concrete
        object schemas (each closed with additionalProperties: false), and each
        declares the OTHER source with the `false` schema — so codegen emits it
        as `?: never` and the union is EXACT, not merely structural: a payload
        naming both sources fails to type even when built in a variable (excess-
        property checks only cover literals). Both sources, or neither, is 400
        at the API either way.
      oneOf:
        - $ref: "#/components/schemas/CleanPreviewByDocument"
        - $ref: "#/components/schemas/CleanPreviewByText"

    CleanPreviewChunk:
      type: object
      description: |
        One previewed chunk. Computed on the fly and never stored, so it carries no
        id/document_id/build_id — offsets satisfy raw[start_offset:end_offset] == text
        exactly (the same invariant stored chunks freeze for §27.4 evidence spans).
      required: [ordinal, text, start_offset, end_offset, token_count]
      properties:
        ordinal:
          type: integer
          minimum: 0
        text:
          type: string
          minLength: 1
        start_offset:
          type: integer
          minimum: 0
        end_offset:
          description: Exclusive end, per Python slice semantics.
          type: integer
          minimum: 1
        token_count:
          type: integer
          minimum: 1

    CleanPreviewResult:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/CleanPreviewChunk"

    CleanPreviewResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/CleanPreviewResult"
        meta:
          $ref: "#/components/schemas/Meta"

    LifecycleStatus:
      type: string
      description: Entity/relation lifecycle (DESIGN §4/§17).
      enum: [active, deprecated, merged, rejected, needs_review]

    ReviewStatus:
      type: string
      enum: [unreviewed, approved, rejected]

    CreatedBy:
      type: string
      enum: [rule, llm, manual]

    Entity:
      type: object
      required: [id, build_id, type, canonical_name, entity_key, status]
      properties:
        id:
          type: string
          format: uuid
          description: canonical_id shared by all three stores.
        project:
          type: string
        build_id:
          type: string
          format: uuid
        type:
          type: string
        canonical_name:
          type: string
        entity_key:
          type: string
          description: Cross-build stable fingerprint (DESIGN §27.3).
        attributes:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/LifecycleStatus"
        review_status:
          $ref: "#/components/schemas/ReviewStatus"
        created_by:
          $ref: "#/components/schemas/CreatedBy"
        created_at:
          type: ["string", "null"]
          format: date-time
        updated_at:
          type: ["string", "null"]
          format: date-time

    RelationEvidence:
      type: object
      required: [id, evidence_type]
      properties:
        id:
          type: string
          format: uuid
        evidence_type:
          type: string
          enum: [chunk, row, manual]
        evidence_ref:
          type: ["string", "null"]
        chunk_id:
          type: ["string", "null"]
          format: uuid
        start_offset:
          type: ["integer", "null"]
        end_offset:
          type: ["integer", "null"]
        quote:
          type: ["string", "null"]
          maxLength: 512
        source_uri:
          type: ["string", "null"]
          description: Denormalized so evidence survives pruning of old chunks (DESIGN §27.4).
        confidence:
          type: ["number", "null"]

    Relation:
      type: object
      required: [id, build_id, src_entity_id, dst_entity_id, type, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        build_id:
          type: string
          format: uuid
        src_entity_id:
          type: string
          format: uuid
        dst_entity_id:
          type: string
          format: uuid
        type:
          type: string
        attributes:
          type: object
          additionalProperties: true
        relation_signature:
          type: string
          description: Cross-build stable fingerprint (DESIGN §27.3).
        status:
          $ref: "#/components/schemas/LifecycleStatus"
        review_status:
          $ref: "#/components/schemas/ReviewStatus"
        created_by:
          $ref: "#/components/schemas/CreatedBy"
        confidence:
          type: ["number", "null"]
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/RelationEvidence"
        created_at:
          type: ["string", "null"]
          format: date-time
        updated_at:
          type: ["string", "null"]
          format: date-time

    BuildStep:
      description: |
        One pipeline step of a build (v1.3, RB1 — §27.7 observability). Counts
        are nullable: a step that never ran reports nulls, never fabricated
        zeros. `status` is an open vocabulary (no frozen enum — §4/§18 freeze
        no step-status set); minimum vocabulary includes `failed`.
      type: object
      required: [id, step_name, status]
      properties:
        id:
          type: string
          format: uuid
        step_name:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
        started_at:
          type: ["string", "null"]
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time
        input_count:
          type: ["integer", "null"]
          minimum: 0
        output_count:
          type: ["integer", "null"]
          minimum: 0
        skipped_count:
          type: ["integer", "null"]
          minimum: 0
        failed_count:
          type: ["integer", "null"]
          minimum: 0
        error:
          type: ["object", "null"]
          additionalProperties: true

    BuildStepItem:
      description: |
        One recorded item outcome of a step (v1.3, RB1). `item_ref` is the
        STABLE retry key (§27.7: document = content_hash, entity = entity_key)
        — what "retry failed only" re-enters. `status` minimum vocabulary is
        `failed|skipped` (default verbosity records only those).
      type: object
      required: [id, item_kind, item_ref, status]
      properties:
        id:
          type: string
          format: uuid
        item_kind:
          type: string
          minLength: 1
        item_ref:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
        message:
          type: ["string", "null"]
        error:
          type: ["object", "null"]
          additionalProperties: true

    # ---- review -------------------------------------------------------------
    MergeCandidateStatus:
      type: string
      enum: [pending, approved, rejected, deferred]

    MergeCandidate:
      type: object
      required: [id, build_id, left_entity_id, right_entity_id, score, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        build_id:
          type: string
          format: uuid
        left_entity_id:
          type: string
          format: uuid
        right_entity_id:
          type: string
          format: uuid
        score:
          type: number
        features:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/MergeCandidateStatus"
        decision:
          type: ["string", "null"]
          enum: [approve, reject, defer, null]
        decided_by:
          type: ["string", "null"]
        decided_at:
          type: ["string", "null"]
          format: date-time
        reason:
          type: ["string", "null"]
        impact:
          type: ["object", "null"]
          additionalProperties: true
          description: Blast-radius info used to rank the review queue.
        left_snapshot:
          type: ["object", "null"]
          additionalProperties: true
        right_snapshot:
          type: ["object", "null"]
          additionalProperties: true

    ReviewDecisionRequest:
      type: object
      properties:
        reason:
          type: ["string", "null"]

    OntologyProposalStatus:
      type: string
      enum: [proposed, accepted, rejected]

    OntologyProposal:
      description: |
        One LLM-proposed ontology type awaiting review (v1.3, GOV3 — the C3c
        proposal pool; §17 `proposed → accepted|rejected`). One pool row per
        proposed type per project, keyed by the stable `proposal_key`.
      type: object
      required: [id, kind, type_name, proposal_key, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        kind:
          description: What the proposed type would type (mirrors the DDL CHECK).
          type: string
          enum: [entity, relation]
        type_name:
          description: The type as first observed.
          type: string
          minLength: 1
        proposal_key:
          description: Stable fingerprint fpv(norm(kind)|norm(type_name)).
          type: string
          minLength: 1
        fingerprint_version:
          type: integer
          minimum: 1
        example:
          description: First observed name/quote.
          type: ["string", "null"]
        chunk_ref:
          description: First observed source (content-stable string).
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/OntologyProposalStatus"
        decided_by:
          type: ["string", "null"]
        decided_at:
          type: ["string", "null"]
          format: date-time
        reason:
          type: ["string", "null"]
        created_at:
          type: ["string", "null"]
          format: date-time

    # ---- graph ----------------------------------------------------------------
    GraphNode:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: ["string", "null"]
        label:
          type: ["string", "null"]
        properties:
          type: object
          additionalProperties: true

    GraphEdge:
      type: object
      required: [id, src, dst, type]
      properties:
        id:
          type: string
          format: uuid
        src:
          type: string
          format: uuid
        dst:
          type: string
          format: uuid
        type:
          type: string
        confidence:
          type: ["number", "null"]
        properties:
          type: object
          additionalProperties: true

    GraphPath:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            type: string
            format: uuid
        edges:
          type: array
          items:
            type: string
            format: uuid

    GraphContext:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/GraphPath"

    # ---- query ------------------------------------------------------------------
    QueryMode:
      type: string
      enum: [semantic, graph, sql, global, hybrid]

    QueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          description: Natural-language question.
        top_k:
          type: ["integer", "null"]
          minimum: 1
          description: Capped by `query_policy.max_top_k`.
        filters:
          type: object
          additionalProperties: true
          description: Store-level filters (e.g. entity type, document metadata).
        options:
          type: object
          additionalProperties: true
          description: "Mode-specific options (e.g. graph: max_hops; capped by query_policy)."

    SourceRefType:
      type: string
      enum: [document, chunk, entity, relation, row]

    SourceRef:
      type: object
      required: [source_type, id]
      properties:
        source_type:
          $ref: "#/components/schemas/SourceRefType"
        id:
          type: string
        source_uri:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true

    ResultType:
      type: string
      enum: [chunk, entity, relation, path, row, community_report]

    RetrievalResult:
      type: object
      description: |
        One retrieval hit. `source_refs` is mandatory and non-empty (`require_sources`,
        DESIGN §16/§27.2) — every answer must be traceable to sources. Results are
        ordered score desc, ties broken by id.
      required: [result_type, id, score, source_refs]
      properties:
        result_type:
          $ref: "#/components/schemas/ResultType"
        id:
          type: string
        title:
          type: ["string", "null"]
        text:
          type: ["string", "null"]
        score:
          type: number
        confidence:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
        source_refs:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SourceRef"

    RoutingDecision:
      type: object
      description: Router trace (§16) — which modes ran and why.
      required: [selected, skipped]
      properties:
        selected:
          type: array
          items:
            $ref: "#/components/schemas/QueryMode"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/QueryMode"
        reason:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
          minimum: 0
          maximum: 1

    QueryDebug:
      type: object
      description: Typed debug block (§16); evolution is additive.
      required: [stores_used, retrieval_plan, routing_decision, latency_ms]
      properties:
        stores_used:
          type: array
          items:
            type: string
        retrieval_plan:
          type: array
          items:
            type: string
        routing_decision:
          description: Null for single-mode queries that bypass the router.
          anyOf:
            - $ref: "#/components/schemas/RoutingDecision"
            - type: "null"
        latency_ms:
          type: integer
          minimum: 0

    QueryResult:
      type: object
      required: [mode, build_id, results, warnings]
      properties:
        mode:
          $ref: "#/components/schemas/QueryMode"
        build_id:
          type: string
          format: uuid
          description: Active build the query ran against (DR-001).
        results:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalResult"
        graph_context:
          anyOf:
            - $ref: "#/components/schemas/GraphContext"
            - type: "null"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
        debug:
          description: |
            Emitted only when `query_policy.expose_debug` and the caller's role allow
            it (§16/§21); null otherwise.
          anyOf:
            - $ref: "#/components/schemas/QueryDebug"
            - type: "null"

    # ---- health / eval ---------------------------------------------------------
    HealthStatus:
      type: string
      description: Project status light (DESIGN §19).
      enum: [healthy, needs_review, build_failed, index_drift, eval_regression]

    HealthReport:
      type: object
      required: [status]
      additionalProperties: true
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        active_build_id:
          type: ["string", "null"]
          format: uuid
        counts:
          type: object
          additionalProperties:
            type: integer
          description: sources/documents/chunks/entities/relations counts.
        pending_review:
          type: integer
        drift:
          type: ["object", "null"]
          additionalProperties: true
          description: Per-store build_id count reconciliation (PG vs Neo4j/Qdrant).
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"

    EvalReport:
      type: object
      additionalProperties: true
      properties:
        build_id:
          type: ["string", "null"]
          format: uuid
        passed:
          type: ["boolean", "null"]
        regression:
          type: ["boolean", "null"]
        metrics:
          type: object
          additionalProperties:
            type: number
          description: |
            Includes GraphRAG metrics `path_validity`, `relation_hit_rate`,
            `groundedness` (DESIGN §27.5) plus recall/similarity/citation coverage.

    McpInfo:
      description: |
        The project's MCP connection surface through the DR-012 gateway (v1.3).
        `url` is the streamable-HTTP endpoint, always present: this route is
        itself path-keyed on `{project}`, so it is only reachable for
        path-addressable projects — exactly the ones for which a gateway URL
        exists. A non-path-addressable name (contains `/`, or is `.`/`..`)
        cannot reach ANY of its `/projects/{project}/…` endpoints, so there is
        no reachable case where `url` would be null; the Console flags such
        projects as Console-only client-side from the name (the same
        isPathAddressable rule), needing no server field. `auth: none` is the
        §23 placeholder (additive enum evolution when auth lands).
      type: object
      required: [transport, auth, url]
      properties:
        transport:
          type: string
          const: streamable-http
        auth:
          type: string
          enum: [none]
        url:
          type: string
          format: uri

    # ---- response envelopes ------------------------------------------------------
    ProjectResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Project"
        meta:
          $ref: "#/components/schemas/Meta"

    ProjectListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        meta:
          $ref: "#/components/schemas/PageMeta"

    SourceResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Source"
        meta:
          $ref: "#/components/schemas/Meta"

    SourceListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        meta:
          $ref: "#/components/schemas/PageMeta"

    BuildResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Build"
        meta:
          $ref: "#/components/schemas/Meta"

    BuildListResponse:
