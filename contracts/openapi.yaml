  /projects/{project}/query/hybrid:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    post:
      operationId: queryHybrid
      tags: [query]
      summary: Hybrid retrieval (router; default entry point)
      description: |
        Router selects and fuses modes; the routing trace is exposed in
        `data.debug.routing_decision` when `query_policy.expose_debug` allows it.
        Store outages degrade to the available modes with a typed warning instead of
        failing the whole query (DESIGN §22).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Retrieval result (active build).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
              example:
                data:
                  mode: hybrid
                  build_id: 7b6a5c4d-3e2f-4a1b-9c8d-7e6f5a4b3c2d
                  results:
                    - result_type: chunk
                      id: 9d8c7b6a-5f4e-4d3c-b2a1-0f9e8d7c6b5a
                      title: onboarding.md#3
                      text: New hires get access on day one…
                      score: 0.87
                      confidence: 0.91
                      source_refs:
                        - source_type: chunk
                          id: 9d8c7b6a-5f4e-4d3c-b2a1-0f9e8d7c6b5a
                          source_uri: s3://acme/docs/onboarding.md
                          metadata: { start_offset: 1204, end_offset: 1490 }
                  graph_context: { nodes: [], edges: [], paths: [] }
                  warnings:
                    - code: MODE_SKIPPED
                      message: "sql skipped: router confidence 0.12 below threshold"
                  debug:
                    stores_used: [qdrant, neo4j]
                    retrieval_plan: [semantic, graph]
                    routing_decision:
                      selected: [semantic, graph]
                      skipped: [sql, global]
                      reason: entity-centric question
                      confidence: 0.83
                    latency_ms: 412
                meta:
                  request_id: 1a2b3c4d-5e6f-4a70-8b91-c2d3e4f5a6b7
                  build_id: 7b6a5c4d-3e2f-4a1b-9c8d-7e6f5a4b3c2d
                  elapsed_ms: 431
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/health:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: getHealth
      tags: [health]
      summary: Project health (status light + counts + drift, DESIGN §19)
      responses:
        "200":
          description: Health report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/metrics:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: getMetrics
      tags: [health]
      summary: Project metrics snapshot
      responses:
        "200":
          description: Metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/eval:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: getEval
      tags: [health]
      summary: Latest eval report (golden-set metrics, DESIGN §20/§27.5)
      responses:
        "200":
          description: Eval report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalResponse"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Auth placeholder (DESIGN §23) — swap the implementation, keep the scheme.

  parameters:
    ProjectPath:
      name: project
      in: path
      required: true
      schema:
        type: string
    BuildIdPath:
      name: build_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobIdPath:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentIdPath:
      name: document_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChunkIdPath:
      name: chunk_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntityIdPath:
      name: entity_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RelationIdPath:
      name: relation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CandidateIdPath:
      name: candidate_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (default 50 🔧).
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor from `meta.next_cursor`; omit for the first page.
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      description: "`field:asc` or `field:desc`."
      schema:
        type: string
        pattern: "^[A-Za-z0-9_]+:(asc|desc)$"
    Filter:
      name: filter
      in: query
      required: false
      description: "Field filters as `filter[field]=value` (deepObject style)."
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-generated key (≤255 chars). Same key + same request hash replays the
        stored original response; same key + different request hash → `409
        IDEMPOTENCY_CONFLICT`. Keys expire after the configured TTL (default 24h 🔧).
      schema:
        type: string
        maxLength: 255

  responses:
    Error:
      description: |
        Error envelope. Status → code mapping: 400 `VALIDATION_ERROR`/`QUERY_UNSAFE` ·
        404 `PROJECT_NOT_FOUND`/`BUILD_NOT_FOUND`/`JOB_NOT_FOUND` · 409
        `IDEMPOTENCY_CONFLICT`/`JOB_CONFLICT`/`BUILD_NOT_READY`/`NO_ACTIVE_BUILD` ·
        429 `RATE_LIMITED` · 503 `STORE_UNAVAILABLE` · 504 `QUERY_TIMEOUT` · 500 `INTERNAL`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: PROJECT_NOT_FOUND
              message: project 'acme' does not exist
              details: null
              request_id: 6f1c2a4e-9b0d-4c39-9a55-1f2f3a4b5c6d
    Conflict:
      description: |
        Conflict — `IDEMPOTENCY_CONFLICT` (same Idempotency-Key, different request),
        `JOB_CONFLICT` (overlapping job), `BUILD_NOT_READY` (activation preflight
        failed) or `NO_ACTIVE_BUILD`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ---- envelope --------------------------------------------------------
    Meta:
      type: object
      description: Success-envelope metadata (DESIGN §15).
      required: [request_id, build_id, elapsed_ms]
      properties:
        request_id:
          type: string
          format: uuid
        build_id:
          description: Build that served the request; null when no build was involved.
          type: ["string", "null"]
          format: uuid
        elapsed_ms:
          type: integer
          minimum: 0

    PageMeta:
      type: object
      description: |
        Envelope metadata for paginated lists — next_cursor is required so clients can
        always distinguish the last page (null) from a non-conforming response.
      required: [request_id, build_id, elapsed_ms, next_cursor]
      properties:
        request_id:
          type: string
          format: uuid
        build_id:
          description: Build that served the request; null when no build was involved.
          type: ["string", "null"]
          format: uuid
        elapsed_ms:
          type: integer
          minimum: 0
        next_cursor:
          description: Opaque cursor for the next page; null on the last page.
          type: ["string", "null"]

    ErrorCode:
      type: string
      description: Frozen error-code enum (DESIGN §27.2; additive-only).
      enum:
        - PROJECT_NOT_FOUND
        - BUILD_NOT_FOUND
        - BUILD_NOT_READY
        - NO_ACTIVE_BUILD
        - VALIDATION_ERROR
        - JOB_NOT_FOUND
        - JOB_CONFLICT
        - IDEMPOTENCY_CONFLICT
        - QUERY_UNSAFE
        - QUERY_TIMEOUT
        - STORE_UNAVAILABLE
        - RATE_LIMITED
        - INTERNAL

    Error:
      type: object
      description: |
        The full frozen shape is always present — details is null rather than absent,
        so error consumers never branch on missing fields.
      required: [code, message, details, request_id]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        details:
          description: Machine-readable context (field errors, guardrail verdicts, …).
          type: ["object", "null"]
          additionalProperties: true
        request_id:
          type: string
          format: uuid

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"

    WarningCode:
      type: string
      description: Frozen warning-code enum (DESIGN §27.2; additive-only).
      enum:
        - STORE_UNAVAILABLE
        - MODE_SKIPPED
        - PARTIAL_RESULTS
        - LOW_CONFIDENCE
        - GUARDRAIL_BLOCKED
        - TRUNCATED

    Warning:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/WarningCode"
        message:
          type: string

    # ---- projects / sources ----------------------------------------------
    Project:
      type: object
      required: [name, created_at]
      properties:
        name:
          type: string
          description: Stable project key (used in paths and store scoping).
        display_name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        display_name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        config:
          type: object
          additionalProperties: true

    ProjectUpdate:
      type: object
      properties:
        display_name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        config:
          type: object
          additionalProperties: true

    Source:
      type: object
      required: [id, uri]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: Connector kind (e.g. file, directory, url, database).
        uri:
          type: string
        metadata:
          type: object
          additionalProperties: true
        added_at:
          type: string
          format: date-time

    SourceCreate:
      type: object
      required: [uri]
      properties:
        kind:
          type: string
        uri:
          type: string
          minLength: 1
        metadata:
          type: object
          additionalProperties: true

    IngestRequest:
      type: object
      properties:
        source_ids:
          description: Restrict ingestion to these sources; omit for all.
          type: array
          items:
            type: string
            format: uuid

    BuildRequest:
      type: object
      properties:
        reason:
          type: ["string", "null"]
          description: Free-form operator note recorded on the build.

    # ---- builds ------------------------------------------------------------
    BuildStatus:
      type: string
      description: Build lifecycle (DESIGN §4/§14).
      enum: [building, ready, active, failed, archived]

    Build:
      type: object
      required: [id, project, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        status:
          $ref: "#/components/schemas/BuildStatus"
        config_hash:
          type: ["string", "null"]
        source_hash:
          type: ["string", "null"]
        started_at:
          type: ["string", "null"]
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time
        activated_at:
          type: ["string", "null"]
          format: date-time
        metrics:
          type: ["object", "null"]
          additionalProperties: true
        eval:
          type: ["object", "null"]
          additionalProperties: true

    # ---- jobs ---------------------------------------------------------------
    JobStatus:
      type: string
      enum: [queued, running, done, failed, cancelled]

    JobAccepted:
      type: object
      description: 202 payload for long operations (DESIGN §15).
      required: [job_id, status]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"

    Job:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"
        kind:
          type: string
          description: e.g. ingest, build, reproject.
        project:
          type: ["string", "null"]
        build_id:
          description: Building build this job writes to; null for jobs not bound to a build (DESIGN §27.7).
          type: ["string", "null"]
          format: uuid
        step:
          type: ["string", "null"]
        progress:
          type: number
          minimum: 0
          maximum: 1
        message:
          type: ["string", "null"]
        error:
          anyOf:
            - $ref: "#/components/schemas/Error"
            - type: "null"
        created_at:
          type: ["string", "null"]
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time

    JobEvent:
      type: object
      description: |
        SSE `data:` payload; event names are job.update|job.done|job.failed (DESIGN
        §27.2). The full frozen shape is always present — step/message are null rather
        than absent, so SSE consumers never branch on missing fields.
      required: [job_id, status, step, progress, message, ts]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"
        step:
          type: ["string", "null"]
        progress:
          type: number
          minimum: 0
          maximum: 1
        message:
          type: ["string", "null"]
        ts:
          type: string
          format: date-time

    # ---- inspection ---------------------------------------------------------
    Document:
      type: object
      required: [id, build_id, source_uri]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        build_id:
          type: string
          format: uuid
        source_uri:
          type: string
        content_hash:
          type: string
        mime:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string
        ingested_at:
          type: ["string", "null"]
          format: date-time
        raw:
          type: ["string", "null"]
          description: Raw text; returned on detail GET only.

    Chunk:
      type: object
      required: [id, document_id, build_id, ordinal, text]
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        build_id:
          type: string
          format: uuid
        ordinal:
          type: integer
        text:
          type: string
        token_count:
          type: ["integer", "null"]
        start_offset:
          type: ["integer", "null"]
        end_offset:
          type: ["integer", "null"]
        vector_point_id:
          type: ["string", "null"]
          format: uuid
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string

    CleanPreviewByDocument:
      type: object
      description: Chunk a document's raw text, read from the ACTIVE build.
      additionalProperties: false
      required: [document_id]
      properties:
        max_chars:
          description: Window size; omitted → project config, then engine default.
          type: integer
          minimum: 1
        overlap:
          description: Window overlap; omitted → project config, then engine default.
          type: integer
          minimum: 0
        document_id:
          type: string
          format: uuid
        text: false

    CleanPreviewByText:
      type: object
      description: Chunk the given text directly — works before any build exists.
      additionalProperties: false
      required: [text]
      properties:
        max_chars:
          description: Window size; omitted → project config, then engine default.
          type: integer
          minimum: 1
        overlap:
          description: Window overlap; omitted → project config, then engine default.
          type: integer
          minimum: 0
        text:
          type: string
          minLength: 1
        document_id: false

    CleanPreviewRequest:
      description: |
        Exactly ONE source: document_id or text. The two variants are concrete
        object schemas (each closed with additionalProperties: false), and each
        declares the OTHER source with the `false` schema — so codegen emits it
        as `?: never` and the union is EXACT, not merely structural: a payload
        naming both sources fails to type even when built in a variable (excess-
        property checks only cover literals). Both sources, or neither, is 400
        at the API either way.
      oneOf:
        - $ref: "#/components/schemas/CleanPreviewByDocument"
        - $ref: "#/components/schemas/CleanPreviewByText"

    CleanPreviewChunk:
      type: object
      description: |
        One previewed chunk. Computed on the fly and never stored, so it carries no
        id/document_id/build_id — offsets satisfy raw[start_offset:end_offset] == text
        exactly (the same invariant stored chunks freeze for §27.4 evidence spans).
      required: [ordinal, text, start_offset, end_offset, token_count]
      properties:
        ordinal:
          type: integer
          minimum: 0
        text:
          type: string
          minLength: 1
        start_offset:
          type: integer
          minimum: 0
        end_offset:
          description: Exclusive end, per Python slice semantics.
          type: integer
          minimum: 1
        token_count:
          type: integer
          minimum: 1

    CleanPreviewResult:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/CleanPreviewChunk"

    CleanPreviewResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/CleanPreviewResult"
        meta:
          $ref: "#/components/schemas/Meta"

    LifecycleStatus:
      type: string
      description: Entity/relation lifecycle (DESIGN §4/§17).
      enum: [active, deprecated, merged, rejected, needs_review]

    ReviewStatus:
      type: string
      enum: [unreviewed, approved, rejected]

    CreatedBy:
      type: string
      enum: [rule, llm, manual]

    Entity:
      type: object
      required: [id, build_id, type, canonical_name, entity_key, status]
      properties:
        id:
          type: string
          format: uuid
          description: canonical_id shared by all three stores.
        project:
          type: string
        build_id:
          type: string
          format: uuid
        type:
          type: string
        canonical_name:
          type: string
        entity_key:
          type: string
          description: Cross-build stable fingerprint (DESIGN §27.3).
        attributes:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/LifecycleStatus"
        review_status:
          $ref: "#/components/schemas/ReviewStatus"
        created_by:
          $ref: "#/components/schemas/CreatedBy"
        created_at:
          type: ["string", "null"]
          format: date-time
        updated_at:
          type: ["string", "null"]
          format: date-time

    RelationEvidence:
      type: object
      required: [id, evidence_type]
      properties:
        id:
          type: string
          format: uuid
        evidence_type:
          type: string
          enum: [chunk, row, manual]
        evidence_ref:
          type: ["string", "null"]
        chunk_id:
          type: ["string", "null"]
          format: uuid
        start_offset:
          type: ["integer", "null"]
        end_offset:
          type: ["integer", "null"]
        quote:
          type: ["string", "null"]
          maxLength: 512
        source_uri:
          type: ["string", "null"]
          description: Denormalized so evidence survives pruning of old chunks (DESIGN §27.4).
        confidence:
          type: ["number", "null"]

    Relation:
      type: object
      required: [id, build_id, src_entity_id, dst_entity_id, type, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        build_id:
          type: string
          format: uuid
        src_entity_id:
          type: string
          format: uuid
        dst_entity_id:
          type: string
          format: uuid
        type:
          type: string
        attributes:
          type: object
          additionalProperties: true
        relation_signature:
          type: string
          description: Cross-build stable fingerprint (DESIGN §27.3).
        status:
          $ref: "#/components/schemas/LifecycleStatus"
        review_status:
          $ref: "#/components/schemas/ReviewStatus"
        created_by:
          $ref: "#/components/schemas/CreatedBy"
        confidence:
          type: ["number", "null"]
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/RelationEvidence"
        created_at:
          type: ["string", "null"]
          format: date-time
        updated_at:
          type: ["string", "null"]
          format: date-time

    # ---- review -------------------------------------------------------------
    MergeCandidateStatus:
      type: string
      enum: [pending, approved, rejected, deferred]

    MergeCandidate:
      type: object
      required: [id, build_id, left_entity_id, right_entity_id, score, status]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
        build_id:
          type: string
          format: uuid
        left_entity_id:
          type: string
          format: uuid
        right_entity_id:
          type: string
          format: uuid
        score:
          type: number
        features:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/MergeCandidateStatus"
        decision:
          type: ["string", "null"]
          enum: [approve, reject, defer, null]
        decided_by:
          type: ["string", "null"]
        decided_at:
          type: ["string", "null"]
          format: date-time
        reason:
          type: ["string", "null"]
        impact:
          type: ["object", "null"]
          additionalProperties: true
          description: Blast-radius info used to rank the review queue.
        left_snapshot:
          type: ["object", "null"]
          additionalProperties: true
        right_snapshot:
          type: ["object", "null"]
          additionalProperties: true

    ReviewDecisionRequest:
      type: object
      properties:
        reason:
          type: ["string", "null"]

    # ---- graph ----------------------------------------------------------------
    GraphNode:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: ["string", "null"]
        label:
          type: ["string", "null"]
        properties:
          type: object
          additionalProperties: true

    GraphEdge:
      type: object
      required: [id, src, dst, type]
      properties:
        id:
          type: string
          format: uuid
        src:
          type: string
          format: uuid
        dst:
          type: string
          format: uuid
        type:
          type: string
        confidence:
          type: ["number", "null"]
        properties:
          type: object
          additionalProperties: true

    GraphPath:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            type: string
            format: uuid
        edges:
          type: array
          items:
            type: string
            format: uuid

    GraphContext:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/GraphPath"

    # ---- query ------------------------------------------------------------------
    QueryMode:
      type: string
      enum: [semantic, graph, sql, global, hybrid]

    QueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          description: Natural-language question.
        top_k:
          type: ["integer", "null"]
          minimum: 1
          description: Capped by `query_policy.max_top_k`.
        filters:
          type: object
          additionalProperties: true
          description: Store-level filters (e.g. entity type, document metadata).
        options:
          type: object
          additionalProperties: true
          description: "Mode-specific options (e.g. graph: max_hops; capped by query_policy)."

    SourceRefType:
      type: string
      enum: [document, chunk, entity, relation, row]

    SourceRef:
      type: object
      required: [source_type, id]
      properties:
        source_type:
          $ref: "#/components/schemas/SourceRefType"
        id:
          type: string
        source_uri:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true

    ResultType:
      type: string
      enum: [chunk, entity, relation, path, row, community_report]

    RetrievalResult:
      type: object
      description: |
        One retrieval hit. `source_refs` is mandatory and non-empty (`require_sources`,
        DESIGN §16/§27.2) — every answer must be traceable to sources. Results are
        ordered score desc, ties broken by id.
      required: [result_type, id, score, source_refs]
      properties:
        result_type:
          $ref: "#/components/schemas/ResultType"
        id:
          type: string
        title:
          type: ["string", "null"]
        text:
          type: ["string", "null"]
        score:
          type: number
        confidence:
          type: ["number", "null"]
          minimum: 0
          maximum: 1
        source_refs:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SourceRef"

    RoutingDecision:
      type: object
      description: Router trace (§16) — which modes ran and why.
      required: [selected, skipped]
      properties:
        selected:
          type: array
          items:
            $ref: "#/components/schemas/QueryMode"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/QueryMode"
        reason:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
          minimum: 0
          maximum: 1

    QueryDebug:
      type: object
      description: Typed debug block (§16); evolution is additive.
      required: [stores_used, retrieval_plan, routing_decision, latency_ms]
      properties:
        stores_used:
          type: array
          items:
            type: string
        retrieval_plan:
          type: array
          items:
            type: string
        routing_decision:
          description: Null for single-mode queries that bypass the router.
          anyOf:
            - $ref: "#/components/schemas/RoutingDecision"
            - type: "null"
        latency_ms:
          type: integer
          minimum: 0

    QueryResult:
      type: object
      required: [mode, build_id, results, warnings]
      properties:
        mode:
          $ref: "#/components/schemas/QueryMode"
        build_id:
          type: string
          format: uuid
          description: Active build the query ran against (DR-001).
        results:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalResult"
        graph_context:
          anyOf:
            - $ref: "#/components/schemas/GraphContext"
            - type: "null"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
        debug:
          description: |
            Emitted only when `query_policy.expose_debug` and the caller's role allow
            it (§16/§21); null otherwise.
          anyOf:
            - $ref: "#/components/schemas/QueryDebug"
            - type: "null"

    # ---- health / eval ---------------------------------------------------------
    HealthStatus:
      type: string
      description: Project status light (DESIGN §19).
      enum: [healthy, needs_review, build_failed, index_drift, eval_regression]

    HealthReport:
      type: object
      required: [status]
      additionalProperties: true
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        active_build_id:
          type: ["string", "null"]
          format: uuid
        counts:
          type: object
          additionalProperties:
            type: integer
          description: sources/documents/chunks/entities/relations counts.
        pending_review:
          type: integer
        drift:
          type: ["object", "null"]
          additionalProperties: true
          description: Per-store build_id count reconciliation (PG vs Neo4j/Qdrant).
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"

    EvalReport:
      type: object
      additionalProperties: true
      properties:
        build_id:
          type: ["string", "null"]
          format: uuid
        passed:
          type: ["boolean", "null"]
        regression:
          type: ["boolean", "null"]
        metrics:
          type: object
          additionalProperties:
            type: number
          description: |
            Includes GraphRAG metrics `path_validity`, `relation_hit_rate`,
            `groundedness` (DESIGN §27.5) plus recall/similarity/citation coverage.

