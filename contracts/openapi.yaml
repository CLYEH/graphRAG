    post:
      operationId: queryGraph
      tags: [query]
      summary: Graph retrieval (multi-hop / paths, guardrailed — DESIGN §21/§27.6)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
