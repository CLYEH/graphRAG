# graphRAG Console API — frozen contract (Track 0 P0, DESIGN §15/§27.2, DR-002).
# Evolution is additive-only; a breaking change bumps info.version and adds a DESIGN §26 entry.
openapi: 3.1.0
info:
  title: graphRAG Console API
  version: "1.3"
  description: |
    Frozen OpenAPI contract for the graphRAG Console backend (DESIGN §15, DR-002).
    `core`/`api`/`web` all build against this document; the FastAPI app (BA0) must
    generate a spec that matches it.

    ## Conventions (frozen)
    - **Success envelope** — every JSON success body is
      `{ "data": <payload>, "meta": { "request_id", "build_id", "elapsed_ms" } }`.
    - **Error envelope** — every error body is
      `{ "error": { "code": <ErrorCode>, "message", "details", "request_id" } }`.
      Status mapping: 400 `VALIDATION_ERROR`/`QUERY_UNSAFE` · 404 `*_NOT_FOUND` ·
      409 `IDEMPOTENCY_CONFLICT`/`JOB_CONFLICT`/`BUILD_NOT_READY`/`NO_ACTIVE_BUILD` ·
      429 `RATE_LIMITED` · 503 `STORE_UNAVAILABLE` · 504 `QUERY_TIMEOUT` · 500 `INTERNAL`.
    - **Pagination** — list endpoints take `?limit=&cursor=` (opaque cursor) and return
      `meta.next_cursor` (`null` on the last page).
    - **Sorting / filtering** — `?sort=field:asc|desc` and `?filter[field]=value`.
    - **Long operations** — return `202` with `{data: {job_id, status}}`; progress via
      `GET /jobs/{job_id}/events` (SSE, events `job.update|job.done|job.failed`).
    - **Idempotency** — every POST outside `/query/*` accepts an `Idempotency-Key`
      header. Same key + same request hash → the stored original response is replayed;
      same key + different request hash → `409 IDEMPOTENCY_CONFLICT`. Keys expire after
      a TTL (default 24h, tunable). Query endpoints are read-only RPC and take no key.
    - **Build scoping** — reads are served from the single active build (DR-001/DR-006);
      `meta.build_id` reports which build served the request (`null` if none involved).
    - **Auth placeholder** — all endpoints require the `bearerAuth` scheme (DESIGN §23);
      the local single-principal deployment may accept any token.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: projects
  - name: sources
  - name: builds
  - name: jobs
  - name: inspect
  - name: clean
  - name: review
  - name: query
  - name: health

paths:
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Projects page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      responses:
        "200":
          description: Project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
              example:
                data:
                  name: acme
                  display_name: ACME corpus
                  description: Product & org knowledge base
                  config: {}
                  created_at: "2026-07-01T09:00:00Z"
                meta:
                  request_id: 6f1c2a4e-9b0d-4c39-9a55-1f2f3a4b5c6d
                  build_id: null
                  elapsed_ms: 4
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      responses:
        "204":
          description: Deleted (no body).
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/sources:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: listSources
      tags: [sources]
      summary: List data sources
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Sources page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: addSource
      tags: [sources]
      summary: Register a data source
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceCreate"
      responses:
        "201":
          description: Source registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/sources/{source_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/SourceIdPath"
    patch:
      operationId: updateSource
      tags: [sources]
      summary: Update a source's lifecycle state (v1.3, SRC2 — GAPS G2 option 2)
      description: |
        Soft-disable / re-enable only. `uri` and `kind` are IMMUTABLE — swapping
        corpus = disable the old source + register a new one, so historical builds'
        provenance is never rewritten (the BA9 canonical-uri spirit). A disabled
        source is excluded from FUTURE ingests/builds; existing documents, chunks
        and evidence produced from it are untouched. Unknown source →
        404 SOURCE_NOT_FOUND.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceUpdate"
      responses:
        "200":
          description: Source updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/ingest:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    post:
      operationId: triggerIngest
      tags: [sources]
      summary: Trigger ingestion (long operation)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "202":
          description: Ingest job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
              example:
                data:
                  job_id: 0c9f7a3e-2f65-4f0a-8a2b-7d1e9c4b5a6f
                  status: queued
                meta:
                  request_id: 3f0a1b2c-4d5e-6f70-8192-a3b4c5d6e7f8
                  build_id: null
                  elapsed_ms: 12
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/uploads:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    post:
      operationId: uploadDocuments
      tags: [sources]
      summary: Upload document file(s) into the project's managed corpus (v1.2, DR-010)
      description: |
        Multipart upload of one or more files into a server-managed corpus
        directory, registering/updating ONE canonical `file://` source (BA9
        uri-normalization stays server-owned). Client filenames are never used as
        paths — each file is sanitized to a generated name, the original kept as
        metadata. Optional per-file document metadata (`context`/`governance`
        only — `system` is stamped server-side, DR-010 rule 1) may accompany the
        upload, keyed by the submitted filename (which MUST be unique within a
        request — a duplicate submitted filename is refused with `400`, keeping the
        metadata key unambiguous). Files are accepted or rejected individually — a
        rejected extension or oversized single file is a STATED per-file refusal
        (with a reason), never a silent drop. The whole request is refused with
        `415` when the body is not `multipart/form-data` and `413` when its total
        size exceeds the configured limit.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: binary
                metadata:
                  description: |
                    Optional document metadata keyed by each file's submitted
                    filename → its DocumentMetadataInput (context/governance only;
                    the system namespace is stamped server-side and rejected here).
                    Submitted filenames MUST be unique within a request — the
                    filename is both this metadata key and the managed-corpus
                    identity — so a request containing duplicate submitted filenames
                    is refused (400); the key is therefore never ambiguous.
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/DocumentMetadataInput"
            encoding:
              metadata:
                contentType: application/json
      responses:
        "201":
          description: Upload processed; per-file manifest + the managed source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/Error"
        "415":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/build:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    post:
      operationId: triggerBuild
      tags: [builds]
      summary: Trigger a full build (long operation)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRequest"
      responses:
        "202":
          description: Build job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: listBuilds
      tags: [builds]
      summary: List builds
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Builds page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildListResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
    get:
      operationId: getBuild
      tags: [builds]
      summary: Get a build
      responses:
        "200":
          description: Build.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}/activate:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
    post:
      operationId: activateBuild
      tags: [builds]
      summary: Activate a ready build (atomic single-transaction switch, DR-001)
      description: |
        Preflight (DESIGN §14): build is `ready`, eval passes the threshold, and the
        three stores agree on build_id counts. Any failure rejects the activation
        (`409 BUILD_NOT_READY`).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Build activated; previous active build archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}/rollback:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
    post:
      operationId: rollbackBuild
      tags: [builds]
      summary: Roll back to a previous ready/archived build (atomic, DR-001)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Rollback applied; the given build is active again.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}/eval:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
    post:
      operationId: runBuildEval
      tags: [builds]
      summary: Run the project's golden set against a build (async job, DESIGN §20/§27.5, v1.2)
      description: |
        Runs the project's configured golden set against the NAMED build — the
        same core eval path the CLI walks — landing the result where activation
        preflight reads §14 scores, so Console gating works with zero new
        coupling. Async (a golden set is unbounded work): returns `202` + a job
        envelope, watchable via `GET /jobs/{job_id}/events`. No request body: the
        build is named in the path and the golden set is the project's configured
        one. Idempotent per (build, golden-set fingerprint) — a duplicate run over
        the same build and golden set replays via the Idempotency-Key rather than
        recomputing.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Eval job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}/retry:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
    post:
      operationId: retryBuild
      tags: [builds]
      summary: Retry a failed build's failed items as a NEW build (v1.3, RB1)
      description: |
        Opens a NEW build recording `parent_build_id = {build_id}`, reusing the
        parent's successful artifacts and re-running ONLY its failed items
        (§27.7 `retry_failed_only`). The parent's terminal record is never
        mutated (audit integrity) — lineage is the child's pointer, not an edit.
        A full re-run is `POST /projects/{project}/build`, not this. Only a
        terminal `failed` build can be retried: any other status →
        409 BUILD_NOT_RETRYABLE. Async: `202` + job envelope, same shape as
        `triggerBuild`; one active job per project (409 JOB_CONFLICT).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetryRequest"
      responses:
        "202":
          description: Retry build job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}/steps:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
    get:
      operationId: listBuildSteps
      tags: [builds]
      summary: Per-step drill-down for a build (v1.3, RB1)
      description: |
        The build's pipeline steps (§27.7 observability), newest run first —
        the failure-diagnosis surface behind "retry failed only". Counts are
        nullable: a step that never ran reports nulls, never fabricated zeros.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Build steps page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildStepListResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/builds/{build_id}/steps/{step_id}/items:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/BuildIdPath"
      - $ref: "#/components/parameters/StepIdPath"
    get:
      operationId: listStepItems
      tags: [builds]
      summary: Per-item drill-down for one build step (v1.3, RB1)
      description: |
        The step's recorded item outcomes (§27.7; default verbosity records
        failed/skipped only — `item_ref` is the stable retry key: document =
        content_hash, entity = entity_key). `filter[status]` narrows to e.g.
        failed items; unsupported filters are rejected loud (SS1a discipline).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Step items page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildStepItemListResponse"
        default:
          $ref: "#/components/responses/Error"

  /jobs/{job_id}:
    parameters:
      - $ref: "#/components/parameters/JobIdPath"
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job status
      responses:
        "200":
          description: Job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        default:
          $ref: "#/components/responses/Error"

  /jobs/{job_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/JobIdPath"
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Request job cancellation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Cancellation requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /jobs/{job_id}/events:
    parameters:
      - $ref: "#/components/parameters/JobIdPath"
    get:
      operationId: streamJobEvents
      tags: [jobs]
      summary: Job progress stream (Server-Sent Events)
      description: |
        SSE stream (DESIGN §27.2). Frozen event names: `job.update`, `job.done`,
        `job.failed`; each event's `data:` line is a JSON `JobEvent`. Example frames:

            event: job.update
            data: {"job_id":"0c9f…","status":"running","step":"graph","progress":0.42,"message":null,"ts":"2026-07-02T07:12:03Z"}

            event: job.done
            data: {"job_id":"0c9f…","status":"done","step":null,"progress":1,"message":"build ready","ts":"2026-07-02T07:15:40Z"}
      x-sse-events: ["job.update", "job.done", "job.failed"]
      responses:
        "200":
          description: Event stream; ends after `job.done` / `job.failed`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/JobEvent"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/documents:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: listDocuments
      tags: [inspect]
      summary: List documents (active build)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Q"
      responses:
        "200":
          description: Documents page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/documents/{document_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/DocumentIdPath"
    get:
      operationId: getDocument
      tags: [inspect]
      summary: Get a document (includes raw text)
      responses:
        "200":
          description: Document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/chunks:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: listChunks
      tags: [inspect]
      summary: List chunks (active build)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
      responses:
        "200":
          description: Chunks page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkListResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/chunks/{chunk_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/ChunkIdPath"
    get:
      operationId: getChunk
      tags: [inspect]
      summary: Get a chunk
      responses:
        "200":
          description: Chunk.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/clean/preview:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    post:
      operationId: previewClean
      tags: [clean]
      summary: Preview chunking (§10.2 抽樣預覽) — a pure function; nothing is persisted
      description: |
        Chunk ONE source with the given parameters and return the chunks that a build
        WOULD produce, without writing anything. The source is exactly one of
        `document_id` (that document's raw text, read from the ACTIVE build) or `text`
        (chunk the given text — usable before any build exists). Omitted `max_chars` /
        `overlap` fall back to the project's configured chunking values, then to the
        engine defaults, so the no-parameter preview shows what a build would actually do.
        The pair must satisfy `0 <= overlap < max_chars` — a relation two independent
        numeric bounds cannot express in JSON Schema, so it is enforced at runtime
        (violations answer 400 VALIDATION_ERROR).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanPreviewRequest"
      responses:
        "200":
          description: |
            The chunks these parameters would produce. meta.build_id names the active
            build the document was read from; null for the `text` source (no build
            involved).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanPreviewResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/entities:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
    get:
      operationId: listEntities
      tags: [inspect]
      summary: List entities (active build)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/Q"
      responses:
        "200":
          description: Entities page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityListResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/entities/{entity_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/EntityIdPath"
    get:
      operationId: getEntity
      tags: [inspect]
      summary: Get an entity
      responses:
        "200":
          description: Entity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityResponse"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/entities/{entity_id}/approve:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/EntityIdPath"
    post:
      operationId: approveEntity
      tags: [review]
      summary: Approve an entity (v1.3, GOV2 — recorded in review_ledger, DR-003)
      description: |
        §17 entity review: `needs_review → approved`. The decision keys on the
        type-free v2 ledger fingerprint (DR-011 `ledger_entity_key`), so it
        carries across builds; re-deciding appends (precedence resolves), never
        conflicts.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Decision recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        default:
          $ref: "#/components/responses/Error"

  /projects/{project}/entities/{entity_id}/reject:
    parameters:
      - $ref: "#/components/parameters/ProjectPath"
      - $ref: "#/components/parameters/EntityIdPath"
    post:
      operationId: rejectEntity
      tags: [review]
      summary: Reject an entity (v1.3, GOV2 — recorded in review_ledger, DR-003)
      description: |
        §17 entity review: `needs_review → rejected`; the rejected key is
        excluded from future projections (DR-003 carry-forward).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
